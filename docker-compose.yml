services:
  server:
    build: ./server
    container_name: warroom-server
    restart: unless-stopped
    env_file: ./server/.env
    volumes:
      - sqlite-data:/app/data
    expose:
      - "5050"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5050/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  client:
    build: ./client
    container_name: warroom-client
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  sqlite-data:
